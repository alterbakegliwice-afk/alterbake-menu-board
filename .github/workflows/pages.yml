# Publikacja menu online: pliki tablicy (katalog glowny repo) trafiaja na GitHub Pages
# przy kazdym pushu do main. Adres strony (do bio na Instagramie):
# https://alterbakegliwice-afk.github.io/alterbake-menu-board/
#
# Wymaga jednorazowego wlaczenia: Settings -> Pages -> Source: GitHub Actions.
name: Publikacja menu online

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
