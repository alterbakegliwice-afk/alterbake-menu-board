<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <title>AlterBake - Instagram Post (1080x1080)</title>
    <!--
      SZABLON: Post na Instagram / Facebook (1080x1080).
      Jak zrobic grafike: otworz w przegladarce i zrob zrzut ekranu,
      albo uzyj skryptu tests/render-materials.js (npm run materials).
      Edytuj liste produktow w sekcji <body>.
    -->
    <style>
      /* Anton (SIL OFL) - logotyp ALTERBAKE, lokalnie z ../fonts/, bez CDN. */
      @font-face {
        font-family: "Anton";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src:
          url("../fonts/anton-latin-ext-400-normal.woff2") format("woff2"),
          url("../fonts/anton-latin-ext-400-normal.woff") format("woff");
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      @font-face {
        font-family: "Anton";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src:
          url("../fonts/anton-latin-400-normal.woff2") format("woff2"),
          url("../fonts/anton-latin-400-normal.woff") format("woff");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      /* Fraunces (SIL OFL) - lokalnie z ../fonts/, bez CDN. */
      @font-face {
        font-family: "Fraunces";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url("../fonts/fraunces-latin-ext-400-normal.woff2") format("woff2");
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      @font-face {
        font-family: "Fraunces";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url("../fonts/fraunces-latin-400-normal.woff2") format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: "Fraunces";
        font-style: normal;
        font-weight: 600;
        font-display: swap;
        src: url("../fonts/fraunces-latin-ext-600-normal.woff2") format("woff2");
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      @font-face {
        font-family: "Fraunces";
        font-style: normal;
        font-weight: 600;
        font-display: swap;
        src: url("../fonts/fraunces-latin-600-normal.woff2") format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }

      :root {
        --ink: #1d1b18;
        --paper: #faf9f6;
        --panel: #fffdf9;
        --line: rgba(29, 27, 24, 0.18);
        --line-soft: rgba(29, 27, 24, 0.1);
        --gold: #c9a86a;
        --olive: #6f6a61;
        --brick: #77603a;
      }

      * { box-sizing: border-box; margin: 0; }

      body {
        width: 1080px;
        height: 1080px;
        display: flex;
        flex-direction: column;
        padding: 80px 84px 64px;
        background:
          radial-gradient(900px 620px at 82% -12%, rgba(201, 168, 106, 0.08), transparent 60%),
          linear-gradient(180deg, #faf9f6 0%, #efede7 100%);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      }

      .kicker {
        color: var(--olive);
        font-size: 28px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .masthead {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        border-bottom: 3px solid var(--ink);
        padding-bottom: 30px;
      }

      .masthead h1 {
        font-family: "Anton", "Arial Narrow", Arial, sans-serif;
        font-size: 88px;
        font-weight: 400;
        line-height: 1;
        letter-spacing: -0.015em;
        text-transform: uppercase;
      }

      .heading {
        margin: 52px 0 12px;
        text-align: center;
      }

      .heading h2 {
        font-family: "Fraunces", Georgia, "Times New Roman", serif;
        font-size: 84px;
        line-height: 1;
        letter-spacing: -0.015em;
      }

      .heading h2::before,
      .heading h2::after {
        content: "";
        display: inline-block;
        width: 90px;
        height: 2px;
        margin: 0 30px;
        background: var(--line);
        vertical-align: middle;
      }

      .items {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        margin: 20px 0 28px;
        padding: 14px 48px;
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 40px;
        background: rgba(255, 255, 255, 0.6);
        box-shadow:
          0 36px 60px -44px rgba(36, 27, 17, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.85);
      }

      .item {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 40px;
        padding: 34px 0;
        border-bottom: 2px solid var(--line-soft);
      }

      .item:last-child { border-bottom: 0; }

      .item h3 {
        font-family: "Fraunces", Georgia, "Times New Roman", serif;
        font-size: 48px;
        font-weight: 600;
        line-height: 1.05;
      }

      .item h3::before {
        content: "";
        display: inline-block;
        width: 26px;
        height: 8px;
        margin-right: 20px;
        border-radius: 999px;
        background: linear-gradient(90deg, #c9a86a, #b8934f);
        vertical-align: middle;
      }

      .item p {
        margin-top: 12px;
        color: #57524a;
        font-size: 32px;
      }

      .item .price {
        white-space: nowrap;
        text-align: right;
      }

      .item .price strong {
        display: block;
        font-size: 64px;
        font-weight: 900;
        line-height: 1;
        letter-spacing: -0.01em;
        font-variant-numeric: tabular-nums;
      }

      .item .price span {
        display: block;
        margin-top: 8px;
        color: var(--olive);
        font-size: 26px;
        font-weight: 800;
      }

      .footer {
        border-top: 1px solid var(--line);
        padding-top: 30px;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-size: 32px;
        font-weight: 800;
      }

      .footer .hours { color: var(--olive); }
    </style>
  </head>
  <body>
    <header class="masthead">
      <h1>AlterBake</h1>
      <p class="kicker">GLIWICE &middot; OD PONAD 100 LAT</p>
    </header>

    <div class="heading">
      <h2>Dziś polecamy</h2>
    </div>

    <section class="items">
      <article class="item">
        <div>
          <h3>Chleb pszenny długodojrzewający</h3>
          <p>Na zakwasie, długo fermentowany.</p>
        </div>
        <div class="price"><strong>16 zł</strong><span>/ 680 g</span></div>
      </article>
      <article class="item">
        <div>
          <h3>Jagodzianka</h3>
          <p>Na maślanym cieście drożdżowym.</p>
        </div>
        <div class="price"><strong>19 zł</strong><span>/ szt.</span></div>
      </article>
      <article class="item">
        <div>
          <h3>Chałka z kruszonką</h3>
          <p>Drożdżowa, z maślaną kruszonką.</p>
        </div>
        <div class="price"><strong>15 zł</strong><span>/ szt.</span></div>
      </article>
    </section>

    <footer class="footer">
      <span>@alterbake</span>
      <span class="hours">ŚWIEŻE OD 8:00</span>
    </footer>
  </body>
</html>
