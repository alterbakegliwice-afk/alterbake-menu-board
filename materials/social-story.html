<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <title>AlterBake - Instagram Story (1080x1920)</title>
    <!--
      SZABLON: Instagram Story / Relacja (1080x1920).
      Jak zrobic grafike: otworz ten plik w przegladarce i zrob zrzut ekranu,
      albo uzyj skryptu tests/render-materials.js (npm run materials).
      Edytuj teksty ponizej w sekcji <body>.
    -->
    <style>
      :root {
        --ink: #211f1a;
        --paper: #f5eddf;
        --panel: #fff9ee;
        --line: #a5a078;
        --gold: #bc8d3f;
        --olive: #777b55;
        --brick: #9f432b;
      }

      * { box-sizing: border-box; margin: 0; }

      body {
        width: 1080px;
        height: 1920px;
        display: flex;
        flex-direction: column;
        padding: 96px 88px;
        background:
          radial-gradient(900px 700px at 90% -8%, rgba(188, 141, 63, 0.2), transparent 62%),
          radial-gradient(800px 650px at -10% 42%, rgba(119, 123, 85, 0.14), transparent 58%),
          radial-gradient(760px 760px at 55% 112%, rgba(159, 67, 43, 0.14), transparent 62%),
          linear-gradient(175deg, #f8f0e1 0%, #f2e7d2 100%);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      }

      .kicker {
        color: var(--olive);
        font-size: 34px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .masthead {
        border-bottom: 6px solid var(--ink);
        padding-bottom: 44px;
      }

      .masthead h1 {
        margin-top: 18px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 128px;
        line-height: 0.95;
      }

      .masthead p {
        margin-top: 20px;
        color: var(--olive);
        font-size: 40px;
        font-weight: 800;
      }

      .hero {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 30px;
      }

      .hero .kicker {
        color: var(--brick);
      }

      .hero h2 {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 120px;
        line-height: 1.02;
        max-width: 860px;
      }

      .hero > p {
        color: #453f36;
        font-size: 48px;
        line-height: 1.3;
        max-width: 820px;
      }

      .price-panel {
        display: flex;
        align-items: baseline;
        gap: 26px;
        margin-top: 26px;
        padding: 44px 64px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 999px;
        background:
          radial-gradient(420px 200px at 15% 0%, rgba(255, 214, 154, 0.25), transparent 60%),
          linear-gradient(135deg, #a84a2e 0%, #93381f 100%);
        color: #fffaf2;
        width: fit-content;
        box-shadow: 0 40px 70px -40px rgba(120, 44, 22, 0.6);
      }

      .price-panel strong {
        font-size: 120px;
        line-height: 1;
      }

      .price-panel span {
        color: #f4d69a;
        font-size: 44px;
        font-weight: 900;
      }

      .footer {
        border-top: 3px solid var(--line);
        padding-top: 40px;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }

      .footer .handle {
        font-size: 42px;
        font-weight: 800;
      }

      .footer .hours {
        color: var(--olive);
        font-size: 36px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
    </style>
  </head>
  <body>
    <header class="masthead">
      <p class="kicker">ALTERBAKE &middot; GLIWICE</p>
      <h1>AlterBake</h1>
      <p>stara piekarnia na nowo &middot; od ponad 100 lat</p>
    </header>

    <section class="hero">
      <p class="kicker">WYPIEK DNIA</p>
      <h2>Kołocz śląski z serem</h2>
      <p>Kruchy spód, twaróg, maślana kruszonka. Świeży od 8:00, dopóki się nie skończy.</p>
      <div class="price-panel">
        <strong>12 zł</strong>
        <span>/ porcja</span>
      </div>
    </section>

    <footer class="footer">
      <span class="handle">@alterbake.gliwice</span>
      <span class="hours">świeże od 8:00</span>
    </footer>
  </body>
</html>
