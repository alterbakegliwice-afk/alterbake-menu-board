<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <title>AlterBake - Instagram Story (1080x1920)</title>
    <!--
      SZABLON: Instagram Story / Relacja (1080x1920).
      Jak zrobic grafike: otworz ten plik w przegladarce i zrob zrzut ekranu,
      albo uzyj skryptu tests/render-materials.js (npm run materials).
      Edytuj teksty ponizej w sekcji <body>.
    -->
    <style>
      /* Fraunces (SIL OFL) - lokalnie z ../fonts/, bez CDN. */
      @font-face {
        font-family: "Fraunces";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url("../fonts/fraunces-latin-ext-400-normal.woff2") format("woff2");
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      @font-face {
        font-family: "Fraunces";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url("../fonts/fraunces-latin-400-normal.woff2") format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: "Fraunces";
        font-style: normal;
        font-weight: 600;
        font-display: swap;
        src: url("../fonts/fraunces-latin-ext-600-normal.woff2") format("woff2");
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      @font-face {
        font-family: "Fraunces";
        font-style: normal;
        font-weight: 600;
        font-display: swap;
        src: url("../fonts/fraunces-latin-600-normal.woff2") format("woff2");
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }

      :root {
        --ink: #1d1b18;
        --paper: #faf9f6;
        --panel: #fffdf9;
        --line: rgba(29, 27, 24, 0.18);
        --gold: #c9a86a;
        --olive: #6f6a61;
        --brick: #77603a;
      }

      * { box-sizing: border-box; margin: 0; }

      body {
        width: 1080px;
        height: 1920px;
        display: flex;
        flex-direction: column;
        padding: 96px 88px;
        background:
          radial-gradient(900px 620px at 82% -12%, rgba(201, 168, 106, 0.08), transparent 60%),
          linear-gradient(180deg, #faf9f6 0%, #efede7 100%);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      }

      .kicker {
        color: var(--olive);
        font-size: 34px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .masthead {
        border-bottom: 3px solid var(--ink);
        padding-bottom: 44px;
      }

      .masthead h1 {
        margin-top: 18px;
        font-family: "Fraunces", Georgia, "Times New Roman", serif;
        font-size: 128px;
        line-height: 0.95;
        letter-spacing: -0.015em;
      }

      .masthead p {
        margin-top: 20px;
        color: var(--olive);
        font-size: 40px;
        font-weight: 800;
      }

      .hero {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 30px;
      }

      .hero .kicker {
        color: var(--brick);
      }

      .hero h2 {
        font-family: "Fraunces", Georgia, "Times New Roman", serif;
        font-size: 120px;
        line-height: 1.02;
        letter-spacing: -0.015em;
        max-width: 860px;
      }

      .hero > p {
        color: #57524a;
        font-size: 48px;
        line-height: 1.3;
        max-width: 820px;
      }

      .price-panel {
        display: flex;
        align-items: baseline;
        gap: 26px;
        margin-top: 26px;
        padding: 44px 64px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        background:
          radial-gradient(420px 200px at 15% 0%, rgba(201, 168, 106, 0.16), transparent 60%),
          linear-gradient(150deg, #2b2721 0%, #191612 100%);
        color: #faf7f0;
        width: fit-content;
        box-shadow: 0 40px 70px -40px rgba(15, 13, 10, 0.6);
      }

      .price-panel strong {
        font-size: 120px;
        line-height: 1;
        letter-spacing: -0.01em;
        font-variant-numeric: tabular-nums;
      }

      .price-panel span {
        color: #c9a86a;
        font-size: 44px;
        font-weight: 900;
      }

      .footer {
        border-top: 1px solid var(--line);
        padding-top: 40px;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }

      .footer .handle {
        font-size: 42px;
        font-weight: 800;
      }

      .footer .hours {
        color: var(--olive);
        font-size: 36px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
    </style>
  </head>
  <body>
    <header class="masthead">
      <p class="kicker">ALTERBAKE &middot; GLIWICE</p>
      <h1>AlterBake</h1>
      <p>stara piekarnia na nowo &middot; od ponad 100 lat</p>
    </header>

    <section class="hero">
      <p class="kicker">WYPIEK DNIA</p>
      <h2>Kołocz śląski z serem</h2>
      <p>Kruchy spód, twaróg, maślana kruszonka. Świeży od 8:00, dopóki się nie skończy.</p>
      <div class="price-panel">
        <strong>12 zł</strong>
        <span>/ porcja</span>
      </div>
    </section>

    <footer class="footer">
      <span class="handle">@alterbake</span>
      <span class="hours">świeże od 8:00</span>
    </footer>
  </body>
</html>
